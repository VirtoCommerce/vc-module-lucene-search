<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="Lucene Search">
  <title>Lucene Search</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="92%" y2="100%">
      <stop offset="0%" stop-color="#5FD080"/>
      <stop offset="100%" stop-color="#2FA85A"/>
    </linearGradient>
    <filter id="lift" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="3.5" flood-color="#0B4F2A" flood-opacity="0.30"/>
    </filter>
  </defs>

  <rect width="128" height="128" rx="28" fill="url(#bg)"/>

  <g transform="translate(64,64)" filter="url(#lift)">
    <!-- Handle -->
    <line x1="14" y1="14" x2="40" y2="40" stroke="#13614E" stroke-width="13" stroke-linecap="round"/>
    <!-- Lens -->
    <circle cx="-6" cy="-6" r="29" fill="#ffffff" stroke="#13614E" stroke-width="6"/>
    <!-- Indexed entries -->
    <line x1="-22" y1="-15" x2="8" y2="-15" stroke="#FFC24D" stroke-width="4.5" stroke-linecap="round"/>
    <line x1="-22" y1="-6" x2="12" y2="-6" stroke="#5FC8F5" stroke-width="4.5" stroke-linecap="round"/>
    <line x1="-22" y1="3" x2="4" y2="3" stroke="#3FD8B4" stroke-width="4.5" stroke-linecap="round"/>
  </g>
</svg>
